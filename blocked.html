<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kairos — Focus Mode</title>
<style>
  :root {
    --bg:    #000000;
    --bg2:   #1c1c1e;
    --sep:   #38383a;
    --text:  #ffffff;
    --text2: #98989e;
    --text3: #636366;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'SF Pro Text', BlinkMacSystemFont, sans-serif;
    font-feature-settings: "kern" 1;
    -webkit-font-smoothing: antialiased;
    background: var(--bg); color: var(--text);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; flex-direction: column;
  }
  .icon {
    width: 56px; height: 56px; background: var(--bg2);
    border-radius: 14px; display: flex; align-items: center;
    justify-content: center; margin-bottom: 28px;
  }
  .site-label { font-size: 11px; color: var(--text3); margin-bottom: 10px; letter-spacing: 0.3px; }
  .title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 10px; }
  .subtitle { font-size: 14px; color: var(--text2); text-align: center; line-height: 1.6; max-width: 280px; margin-bottom: 32px; }
  .quote { font-size: 13px; color: var(--text3); max-width: 260px; text-align: center; line-height: 1.7; font-style: italic; margin-bottom: 36px; }

  /* ── Stats ── */
  .stats { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-bottom: 36px; }
  .stats-today { font-size: 11px; color: var(--text3); }
  .stats-chart { line-height: 0; }

  .back {
    padding: 10px 24px; background: var(--text); border: none;
    border-radius: 20px; color: var(--bg); font-size: 13px;
    font-weight: 600; cursor: pointer; transition: background .15s;
    font-family: inherit; letter-spacing: -0.1px;
  }
  .back:hover { background: #e8e8e8; }
</style>
</head>
<body>

<div class="icon">
  <!-- SF Symbols: circle.slash -->
  <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#636366" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="9"/>
    <line x1="6.34" y1="6.34" x2="17.66" y2="17.66"/>
  </svg>
</div>

<div class="site-label" id="site-name"></div>
<div class="title">You're in Focus Mode</div>
<div class="subtitle">This site is blocked. Come back when you're done.</div>
<p class="quote" id="rand-quote"></p>

<div class="stats">
  <div class="stats-today" id="stats-today"></div>
  <div class="stats-chart" id="stats-chart"></div>
</div>

<button class="back" onclick="history.back()">← Return to work</button>

<script>
const QUOTES = [
  "What you resist, persists. What you focus on, grows.",
  "The mind is a tool. You decide what it cuts.",
  "Depth is built in silence.",
  "One hour of deep work outperforms eight of shallow noise.",
  "You are here because you chose to be. Choose again.",
  "The work is the meditation.",
];

const params = new URLSearchParams(window.location.search);
document.getElementById('site-name').textContent = params.get('site') || 'this site';
document.getElementById('rand-quote').textContent =
  '"' + QUOTES[Math.floor(Math.random() * QUOTES.length)] + '"';

function todayKey() { return new Date().toISOString().slice(0, 10); }

function last7() {
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    days.push(d.toISOString().slice(0, 10));
  }
  return days;
}

chrome.storage.local.get(['kairosAttempts'], function(res) {
  const attempts = res.kairosAttempts || {};
  const today = todayKey();
  const count = attempts[today] || 0;

  const el = document.getElementById('stats-today');
  el.textContent = count <= 1
    ? (count === 0 ? 'First attempt today' : '1 attempt today')
    : count + ' attempts today';

  const days = last7();
  const counts = days.map(function(d) { return attempts[d] || 0; });
  const max = Math.max.apply(null, counts.concat([1]));
  const DAY = ['Su','Mo','Tu','We','Th','Fr','Sa'];

  const bW = 30, gap = 5, maxH = 36, totalW = 7*bW + 6*gap;
  let svg = '<svg width="' + totalW + '" height="' + (maxH+14) + '" viewBox="0 0 ' + totalW + ' ' + (maxH+14) + '">';

  days.forEach(function(date, i) {
    const c = counts[i];
    const h = c > 0 ? Math.max(3, Math.round((c / max) * maxH)) : 2;
    const x = i * (bW + gap);
    const y = maxH - h;
    const isToday = date === today;
    const fill  = isToday ? '#98989e' : '#2c2c2e';
    const tFill = isToday ? '#636366' : '#3a3a3c';
    const d = new Date(date + 'T12:00:00');
    svg += '<rect x="' + x + '" y="' + y + '" width="' + bW + '" height="' + h + '" rx="3" fill="' + fill + '"/>';
    svg += '<text x="' + (x + bW/2) + '" y="' + (maxH+11) + '" text-anchor="middle" fill="' + tFill + '" font-size="9" font-family="-apple-system,sans-serif">' + DAY[d.getDay()] + '</text>';
  });

  svg += '</svg>';
  document.getElementById('stats-chart').innerHTML = svg;
});
</script>
</body>
</html>
