<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kairos</title>
<style>
  :root {
    --bg:    #000000;
    --bg2:   #1c1c1e;
    --bg3:   #2c2c2e;
    --sep:   #38383a;
    --text:  #ffffff;
    --text2: #98989e;
    --text3: #636366;
    --text4: #3a3a3c;
    --green: #30d158;
    --red:   #ff453a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 320px;
    font-family: -apple-system, 'SF Pro Text', BlinkMacSystemFont, sans-serif;
    font-feature-settings: "kern" 1;
    -webkit-font-smoothing: antialiased;
    background: var(--bg);
    color: var(--text);
    min-height: 400px;
  }

  /* ── Header ── */
  .header { padding: 14px 16px 12px; border-bottom: 0.5px solid var(--sep); }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-icon {
    width: 26px; height: 26px;
    background: var(--bg2);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-text { font-size: 14px; font-weight: 600; letter-spacing: -0.3px; color: var(--text); }

  /* ── Toggle ── */
  .toggle-wrap { display: flex; align-items: center; gap: 6px; }
  .toggle-lbl { font-size: 10px; color: var(--text3); letter-spacing: 0.2px; min-width: 30px; text-align: right; }
  .toggle {
    width: 36px; height: 20px;
    background: var(--bg3);
    border-radius: 10px;
    position: relative; cursor: pointer;
    transition: background .2s; flex-shrink: 0;
  }
  .toggle.on { background: var(--text); }
  .toggle.locked { opacity: 0.3; cursor: not-allowed; }
  .toggle::after {
    content: ''; position: absolute;
    width: 16px; height: 16px;
    background: var(--text2);
    border-radius: 50%; top: 2px; left: 2px;
    transition: left .2s, background .2s;
  }
  .toggle.on::after { left: 18px; background: var(--bg); }

  /* ── Section label ── */
  .sec-label {
    font-size: 9px; color: var(--text3);
    text-transform: uppercase; letter-spacing: 1.2px;
    font-weight: 500; margin-bottom: 10px;
  }

  /* ── Timer ── */
  .timer-section { padding: 16px 16px 14px; border-bottom: 0.5px solid var(--sep); }
  .timer-num {
    font-size: 44px; font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -2px; line-height: 1;
    color: var(--text); margin-bottom: 14px;
  }
  .dur-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 10px; }
  .dur-btn {
    background: var(--bg2); border: none; border-radius: 8px;
    color: var(--text2); font-size: 12px; font-weight: 500;
    padding: 7px 0; cursor: pointer; text-align: center;
    transition: all .15s; font-family: inherit;
  }
  .dur-btn:hover { color: var(--text); background: var(--bg3); }
  .dur-btn.sel { background: var(--text); color: var(--bg); font-weight: 600; }
  .ctrl-row { display: flex; gap: 6px; }
  .btn {
    flex: 1; padding: 9px; border-radius: 10px; border: none;
    background: var(--bg2); color: var(--text);
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all .15s; font-family: inherit;
  }
  .btn:hover { background: var(--bg3); }
  .btn.primary { background: var(--text); color: var(--bg); }
  .btn.primary:hover { background: #e8e8e8; }
  .btn.danger { color: var(--red); background: transparent; }
  .btn.danger:hover { background: var(--bg2); }

  /* ── Sites ── */
  .sites-section { padding: 14px 16px; border-bottom: 0.5px solid var(--sep); }
  .sec-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .site-badge { font-size: 10px; color: var(--text3); font-weight: 500; }
  .site-list { display: flex; flex-direction: column; gap: 3px; max-height: 88px; overflow-y: auto; margin-bottom: 8px; }
  .site-list::-webkit-scrollbar { width: 0; }
  .empty-msg { padding: 10px 0; text-align: center; font-size: 12px; color: var(--text4); line-height: 1.5; }
  .site-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 10px; background: var(--bg2);
    border-radius: 8px; font-size: 12px; color: var(--text2);
  }
  .site-x {
    background: none; border: none; color: var(--text4);
    cursor: pointer; font-size: 16px; line-height: 1;
    padding: 0 2px; transition: color .15s; font-family: inherit;
  }
  .site-x:hover { color: var(--red); }
  .site-x:disabled { opacity: 0.2; cursor: not-allowed; }
  .add-row { display: flex; gap: 6px; margin-bottom: 10px; }
  .site-inp {
    flex: 1; padding: 7px 10px; background: var(--bg2);
    border: 0.5px solid transparent; border-radius: 8px;
    color: var(--text); font-size: 12px; outline: none;
    transition: border-color .15s; font-family: inherit;
  }
  .site-inp:focus { border-color: var(--sep); }
  .site-inp::placeholder { color: var(--text4); }
  .add-btn-sm {
    padding: 7px 12px; background: var(--bg2); border: none;
    border-radius: 8px; color: var(--text2); font-size: 12px;
    font-weight: 500; cursor: pointer; transition: all .15s;
    white-space: nowrap; font-family: inherit;
  }
  .add-btn-sm:hover { background: var(--bg3); color: var(--text); }

  /* ── Stats ── */
  .stats-block { border-top: 0.5px solid var(--sep); padding-top: 10px; }
  .stats-today { font-size: 10px; color: var(--text3); margin-bottom: 7px; }
  .stats-chart { line-height: 0; }

  /* ── Presets ── */
  .presets-section { padding: 14px 16px; border-bottom: 0.5px solid var(--sep); }
  .preset-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 5px; }
  .preset-btn {
    padding: 7px 5px; background: var(--bg2); border: none;
    border-radius: 8px; color: var(--text2); font-size: 11px;
    font-weight: 500; cursor: pointer; transition: all .15s;
    text-align: center; line-height: 1.4; font-family: inherit;
  }
  .preset-btn:hover { background: var(--bg3); color: var(--text); }
  @keyframes btn-confirm {
    0%   { background: var(--bg2); color: var(--text2); }
    25%  { background: var(--text); color: var(--bg); transform: scale(0.96); }
    100% { background: var(--bg2); color: var(--text2); transform: scale(1); }
  }
  .preset-btn.added { animation: btn-confirm 0.4s ease-out forwards; pointer-events: none; }

</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#f2f2f2" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/>
          <polyline points="12 7 12 12 15.5 14"/>
        </svg>
      </div>
      <span class="logo-text">Kairos</span>
    </div>
    <div class="toggle-wrap">
      <span class="toggle-lbl" id="tlbl">idle</span>
      <div class="toggle" id="tog"></div>
    </div>
  </div>
</div>

<div class="timer-section">
  <div class="sec-label">focus session</div>
  <div class="timer-num" id="tnum">25:00</div>
  <div class="dur-grid">
    <button class="dur-btn" data-min="15">15 min</button>
    <button class="dur-btn sel" data-min="25">25 min</button>
    <button class="dur-btn" data-min="45">45 min</button>
    <button class="dur-btn" data-min="90">90 min</button>
  </div>
  <div class="ctrl-row">
    <button class="btn primary" id="startbtn">Begin</button>
    <button class="btn danger" id="resetbtn" style="display:none">Reset</button>
  </div>
</div>

<div class="sites-section">
  <div class="sec-header">
    <div class="sec-label" style="margin:0">blocked sites</div>
    <span class="site-badge" id="scnt">0 sites</span>
  </div>
  <div class="site-list" id="slist">
    <div class="empty-msg">No sites added.<br>Use presets or add manually.</div>
  </div>
  <div class="add-row">
    <input type="text" class="site-inp" id="sinp" placeholder="e.g. twitter.com">
    <button class="add-btn-sm" id="addbtn">Add</button>
  </div>
</div>

<div class="presets-section">
  <div class="sec-label" style="margin-bottom:10px">quick add</div>
  <div class="preset-grid">
    <button class="preset-btn" data-sites="twitter.com,x.com">Twitter</button>
    <button class="preset-btn" data-sites="youtube.com">YouTube</button>
    <button class="preset-btn" data-sites="linkedin.com">LinkedIn</button>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
